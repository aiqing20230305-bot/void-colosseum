services:
  - type: web
    name: void-colosseum
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ANTHROPIC_API_KEY
        sync: false   # user sets this manually in Render dashboard
    healthCheckPath: /health
    autoDeploy: true
